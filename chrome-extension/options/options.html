<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based IDS - Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.5));
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            color: #6b7280;
            font-size: 14px;
        }

        .settings-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .settings-section h2 {
            font-size: 16px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .help-text {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 14px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <span class="logo">🛡️</span>
            <div>
                <h1>AI-Based IDS Settings</h1>
                <p class="subtitle">Configure your intrusion detection monitor</p>
            </div>
        </header>

        <div class="settings-section">
            <h2>Server Connection</h2>

            <div class="form-group">
                <label for="apiUrl">API Base URL</label>
                <input type="text" id="apiUrl" placeholder="http://localhost:3000">
                <p class="help-text">The URL of your AI-Based IDS server</p>
            </div>
        </div>

        <div class="settings-section">
            <h2>Monitoring Settings</h2>

            <div class="form-group">
                <label for="checkInterval">Check Interval (seconds)</label>
                <input type="number" id="checkInterval" min="10" max="300" value="30">
                <p class="help-text">How often to check for new threats (10-300 seconds)</p>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="notifications" checked>
                    <label for="notifications" class="checkbox-label">Enable threat notifications</label>
                </div>
                <p class="help-text">Show browser notifications for critical threats</p>
            </div>
        </div>

        <div class="actions">
            <button class="btn-secondary" id="resetBtn">Reset to Defaults</button>
            <button class="btn-primary" id="saveBtn">Save Settings</button>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
